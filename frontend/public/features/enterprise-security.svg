<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Enterprise Security preview">
  <defs>
    <linearGradient id="es-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="es-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#es-bg)"/>
  <g opacity="0.18" stroke="#22d3ee" stroke-width="1.5" fill="none">
    <path d="M0 480 L1200 480"/>
    <path d="M0 420 L1200 420"/>
    <path d="M0 360 L1200 360"/>
    <path d="M0 540 L1200 540"/>
  </g>
  <g transform="translate(600 300)">
    <path d="M0 -150 L120 -100 L120 30 C120 110 60 160 0 180 C-60 160 -120 110 -120 30 L-120 -100 Z"
          fill="url(#es-shield)" stroke="#ffffff" stroke-opacity="0.4" stroke-width="3"/>
    <path d="M-50 10 L-15 45 L60 -35" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(170 480)" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" fill="#22d3ee" fill-opacity="0.7">
    <text x="0" y="0">AES-256</text>
    <text x="120" y="0">SSO</text>
    <text x="200" y="0">SOC 2</text>
    <text x="320" y="0">RBAC</text>
    <text x="440" y="0">GDPR</text>
    <text x="560" y="0">2FA</text>
    <text x="650" y="0">audit-trail</text>
    <text x="800" y="0">zero-trust</text>
  </g>
</svg>
