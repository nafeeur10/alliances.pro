<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Two-way Gmail sync">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(120 260)">
    <rect width="540" height="380" rx="24" fill="#FFFFFF" opacity="0.97"/>
    <g transform="translate(40 50)">
      <rect width="460" height="80" rx="40" fill="#FEE2E2"/>
      <circle cx="50" cy="40" r="22" fill="#DC2626"/>
      <path d="M40 38 L50 48 L62 32" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="48" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#7F1D1D">Gmail</text>
      <g transform="translate(280 22)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#7F1D1D">
        <rect width="78" height="34" rx="17" fill="#FCA5A5"/><text x="22" y="22">VIP</text>
        <rect x="86" width="86" height="34" rx="17" fill="#FCA5A5"/><text x="106" y="22">Q3-deal</text>
      </g>
    </g>
    <g transform="translate(40 160)" fill="#7F1D1D" font-family="ui-sans-serif, system-ui, sans-serif">
      <rect width="460" height="60" rx="14" fill="#FEF3C7"/>
      <path d="M30 40 L40 50 L52 30" stroke="#F59E0B" stroke-width="4" fill="none" stroke-linecap="round"/>
      <text x="68" y="38" font-size="16" font-weight="600" fill="#92400E">Star → activity highlight</text>
    </g>
    <g transform="translate(40 240)" fill="#1F2937" font-family="ui-sans-serif, system-ui, sans-serif">
      <rect width="460" height="60" rx="14" fill="#E0E7FF"/>
      <text x="20" y="38" font-size="16" font-weight="600" fill="#312E81">Label → CRM tag</text>
    </g>
  </g>
  <g transform="translate(720 420)" stroke="#FFFFFF" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 0 L120 0 L150 30 L120 60 L0 60"/>
    <path d="M180 30 L60 30 L30 0 L60 -30 L180 -30"/>
  </g>
  <g transform="translate(940 260)">
    <rect width="540" height="380" rx="24" fill="#FFFFFF" opacity="0.97"/>
    <g transform="translate(40 50)">
      <rect width="460" height="80" rx="40" fill="#EEF2FF"/>
      <circle cx="50" cy="40" r="22" fill="#4F46E5"/>
      <text x="50" y="50" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800" fill="#FFFFFF">A</text>
      <text x="92" y="48" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#312E81">Alliances PRO</text>
    </g>
    <g transform="translate(40 160)" font-family="ui-sans-serif, system-ui, sans-serif">
      <rect width="460" height="60" rx="14" fill="#E0E7FF"/>
      <text x="20" y="38" font-size="16" font-weight="600" fill="#312E81">Tags: VIP · Q3-deal</text>
    </g>
    <g transform="translate(40 240)" font-family="ui-sans-serif, system-ui, sans-serif">
      <rect width="460" height="60" rx="14" fill="#EEF2FF"/>
      <text x="20" y="38" font-size="16" font-weight="600" fill="#4F46E5">Pinned in activity timeline</text>
    </g>
  </g>
  <text x="80" y="820" font-family="ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="700" fill="#FFFFFF">Gmail labels & stars now flow both ways.</text>
