<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Per-seat pricing curve">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E11D48"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(220 180)">
    <rect width="1160" height="540" rx="24" fill="#FFFFFF" opacity="0.97"/>
    <g transform="translate(80 80)">
      <line x1="0" y1="380" x2="940" y2="380" stroke="#FECACA" stroke-width="3"/>
      <line x1="0" y1="380" x2="0" y2="20" stroke="#FECACA" stroke-width="3"/>
      <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#9F1239" font-weight="600">
        <text x="-20" y="385" text-anchor="end">$0</text>
        <text x="-20" y="285" text-anchor="end">$2.5k</text>
        <text x="-20" y="185" text-anchor="end">$5k</text>
        <text x="-20" y="85" text-anchor="end">$10k</text>
        <text x="0" y="410">10</text>
        <text x="234" y="410">25</text>
        <text x="468" y="410">50</text>
        <text x="702" y="410">75</text>
        <text x="936" y="410">100</text>
        <text x="468" y="436" text-anchor="middle" font-size="12" fill="#9F1239">reps on the team</text>
      </g>
      <g fill="none" stroke-width="6" stroke-linecap="round">
        <path d="M0 340 L234 280 L468 188 L702 92 L936 12" stroke="#E11D48"/>
        <path d="M0 358 L936 358" stroke="#10B981" stroke-dasharray="10 8"/>
      </g>
      <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">
        <rect x="700" y="20" width="220" height="38" rx="10" fill="#FECDD3"/>
        <text x="720" y="44" fill="#9F1239">$100/seat — 100 reps</text>
        <rect x="700" y="324" width="220" height="38" rx="10" fill="#A7F3D0"/>
        <text x="720" y="348" fill="#065F46">Flat $39 — any team</text>
      </g>
    </g>
  </g>
  <text x="80" y="820" font-family="ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="700" fill="#FFFFFF">Per-seat scales with hires. Flat doesn't.</text>
</svg>
