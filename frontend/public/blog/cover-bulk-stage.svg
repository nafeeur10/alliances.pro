    </g>
    <g transform="translate(60 110)">
      <g fill="#FFFFFF" stroke="#6366F1" stroke-width="3">
        <rect x="0" y="0" width="280" height="64" rx="10"/>
        <rect x="0" y="76" width="280" height="64" rx="10"/>
        <rect x="0" y="152" width="280" height="64" rx="10"/>
        <rect x="0" y="228" width="280" height="64" rx="10"/>
        <rect x="0" y="304" width="280" height="64" rx="10"/>
      </g>
      <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600" fill="#312E81">
        <text x="20" y="38">Acme Co</text>
        <text x="20" y="114">Globex Ltd</text>
        <text x="20" y="190">Initech</text>
        <text x="20" y="266">Soylent Corp</text>
        <text x="20" y="342">Hooli</text>
      </g>
    </g>
    <g transform="translate(420 200)" stroke="#FFFFFF" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="drop-shadow(0 6px 12px rgba(0,0,0,0.18))">
      <path d="M0 30 L200 30"/>
      <path d="M170 0 L200 30 L170 60"/>
