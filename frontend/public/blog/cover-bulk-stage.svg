    <g transform="translate(740 110)">
      <g fill="#A5B4FC" stroke="#4F46E5" stroke-width="3">
        <rect x="0" y="0" width="280" height="64" rx="10"/>
        <rect x="0" y="76" width="280" height="64" rx="10"/>
