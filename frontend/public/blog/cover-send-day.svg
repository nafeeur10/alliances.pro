<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Send-day calendar test">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(380 180)">
    <rect width="840" height="540" rx="24" fill="#FFFFFF" opacity="0.97"/>
    <g transform="translate(40 50)" font-family="ui-sans-serif, system-ui, sans-serif">
      <text font-size="22" font-weight="700" fill="#9A3412">Open rate by send-day</text>
    </g>
    <g transform="translate(60 110)">
      <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600" fill="#7C2D12">
        <text x="0" y="44">Mon</text>
        <text x="0" y="118">Tue</text>
        <text x="0" y="192">Wed</text>
        <text x="0" y="266">Thu</text>
        <text x="0" y="340">Fri</text>
        <text x="0" y="414">Sat</text>
      </g>
      <g transform="translate(80 24)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#7C2D12">
        <rect x="0" y="0" width="380" height="36" rx="6" fill="#FED7AA"/><text x="394" y="26">32%</text>
        <rect x="0" y="74" width="460" height="36" rx="6" fill="#FB923C"/><text x="474" y="100">38%</text>
        <rect x="0" y="148" width="430" height="36" rx="6" fill="#FB923C" opacity="0.85"/><text x="444" y="174">36%</text>
        <rect x="0" y="222" width="500" height="36" rx="6" fill="#EA580C"/><text x="514" y="248" fill="#FFFFFF">41%</text>
        <rect x="0" y="296" width="320" height="36" rx="6" fill="#FED7AA" opacity="0.85"/><text x="334" y="322">27%</text>
        <rect x="0" y="370" width="240" height="36" rx="6" fill="#FED7AA" opacity="0.6"/><text x="254" y="396">19%</text>
      </g>
    </g>
  </g>
  <text x="80" y="820" font-family="ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="700" fill="#FFFFFF">Friday opens are a third of Tuesday's.</text>
</svg>
