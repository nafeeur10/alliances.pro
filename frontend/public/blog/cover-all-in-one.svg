<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="All-in-one CRM tradeoff">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9F1239"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(180 220)" font-family="ui-sans-serif, system-ui, sans-serif">
    <g transform="translate(0 0)">
      <rect width="280" height="180" rx="20" fill="#FFFFFF"/>
      <text x="140" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#9F1239">Email composer</text>
      <text x="140" y="92" text-anchor="middle" font-size="16" fill="#6B7280">"acceptable"</text>
      <g transform="translate(80 110)" fill="#F472B6">
        <rect width="40" height="12" rx="6"/>
        <rect x="50" width="40" height="12" rx="6" opacity="0.6"/>
        <rect x="100" width="40" height="12" rx="6" opacity="0.3"/>
      </g>
    </g>
    <g transform="translate(320 0)">
      <rect width="280" height="180" rx="20" fill="#FFFFFF"/>
      <text x="140" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#9F1239">Dialer</text>
      <text x="140" y="92" text-anchor="middle" font-size="16" fill="#6B7280">"acceptable"</text>
      <g transform="translate(80 110)" fill="#F472B6">
        <rect width="40" height="12" rx="6"/>
        <rect x="50" width="40" height="12" rx="6" opacity="0.6"/>
        <rect x="100" width="40" height="12" rx="6" opacity="0.3"/>
      </g>
    </g>
    <g transform="translate(640 0)">
      <rect width="280" height="180" rx="20" fill="#FFFFFF"/>
      <text x="140" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#9F1239">Reporting</text>
      <text x="140" y="92" text-anchor="middle" font-size="16" fill="#6B7280">"acceptable"</text>
      <g transform="translate(80 110)" fill="#F472B6">
        <rect width="40" height="12" rx="6"/>
        <rect x="50" width="40" height="12" rx="6" opacity="0.6"/>
        <rect x="100" width="40" height="12" rx="6" opacity="0.3"/>
      </g>
    </g>
    <g transform="translate(960 0)">
      <rect width="280" height="180" rx="20" fill="#FFFFFF"/>
      <text x="140" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#9F1239">Campaigns</text>
      <text x="140" y="92" text-anchor="middle" font-size="16" fill="#6B7280">"acceptable"</text>
      <g transform="translate(80 110)" fill="#F472B6">
        <rect width="40" height="12" rx="6"/>
        <rect x="50" width="40" height="12" rx="6" opacity="0.6"/>
        <rect x="100" width="40" height="12" rx="6" opacity="0.3"/>
      </g>
    </g>
    <g transform="translate(160 240)">
      <rect width="920" height="160" rx="22" fill="#111827"/>
      <text x="460" y="60" text-anchor="middle" font-size="24" font-weight="700" fill="#FBCFE8">One bill · one login · one data model</text>
      <text x="460" y="110" text-anchor="middle" font-size="20" fill="#FCA5A5">Not the best at any single primitive.</text>
    </g>
  </g>
  <text x="80" y="820" font-family="ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="700" fill="#FFFFFF">Couplng > per-feature excellence (usually).</text>
</svg>
