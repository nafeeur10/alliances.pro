## Alliances PRO marketing — nginx routing
##
## Routes:
##   /admin/*      → backend (Filament)
##   /api/*        → backend (Laravel API)
##   /livewire/*   → backend (Livewire endpoints used by Filament)
##   /storage/*    → backend (uploaded media)
##   /horizon/*    → backend (Horizon dashboard)
##   /telescope/*  → backend (Telescope, dev only)
##   *             → frontend (Next.js)

upstream backend_php {
    server backend:9000;
}

upstream frontend_next {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    root /var/www/html/public;

    # /api/og is a Next.js dynamic OG image route — must win over the
    # /api/* regex below, which routes to the Laravel backend.
    location = /api/og {
        proxy_pass http://frontend_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Backend-routed paths -----------------------------------------------
    # NOTE: livewire-<hash> matches Livewire 3's update_uri which rotates per
    # release for cache-busting. Match both the legacy and the current form.
    location ~ ^/(admin|api|livewire(-[a-f0-9]+)?|storage|horizon|telescope|sanctum|broadcasting|up)(/|$) {
        try_files $uri @backend_php;
    }

    location @backend_php {
        include fastcgi_params;
        fastcgi_pass backend_php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS off;
        fastcgi_read_timeout 60s;
    }

    # Filament + Livewire serve their assets from /public — let nginx serve them directly.
    location ~* ^/(css|js|fonts|images|build)/ {
        try_files $uri =404;
    }

    # ---- Frontend (Next.js) -------------------------------------------------
    location / {
        proxy_pass http://frontend_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Security headers ---------------------------------------------------
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
