## Alliances PRO marketing — nginx routing
##
## Routes:
##   /admin/*      → backend (Filament)
##   /api/*        → backend (Laravel API)
##   /livewire/*   → backend (Livewire endpoints used by Filament)
##   /storage/*    → backend (uploaded media)
##   /horizon/*   → backend (Horizon dashboard)
##   /telescope/* → backend (Telescope, dev only)
##   *             → frontend (Next.js)

upstream backend_php {
    server backend:9000;
}

upstream frontend_next {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    # ---- Backend-routed paths -----------------------------------------------
    location ~ ^/(admin|api|livewire|storage|horizon|telescope|sanctum|broadcasting) {
        root /var/www/html/public;
        try_files $uri /index.php?$query_string;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass backend_php;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param HTTP_HOST $host;
            fastcgi_read_timeout 60s;
        }
    }

    # ---- Frontend (Next.js) -------------------------------------------------
    location / {
        proxy_pass http://frontend_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Security headers ---------------------------------------------------
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
