# Source-of-truth for /etc/nginx/sites-available/alliances.pro
# After editing, copy to droplet and run: nginx -t && systemctl reload nginx
# certbot --nginx will inject ssl_certificate / ssl_certificate_key lines.

server {
    listen 80;
    listen [::]:80;
    server_name alliances.pro www.alliances.pro;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alliances.pro www.alliances.pro;

    client_max_body_size 20M;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
