# Source-of-truth for /etc/nginx/sites-available/site-api.alliances.pro
# After editing, copy to droplet and run: nginx -t && systemctl reload nginx
# certbot --nginx will inject ssl_certificate / ssl_certificate_key lines.

server {
    listen 80;
    listen [::]:80;
    server_name site-api.alliances.pro;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name site-api.alliances.pro;

    root /var/www/alliances/backend/current/public;
    index index.php;
    client_max_body_size 20M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    location ~ /\.(ht|env|git) { deny all; }
}
