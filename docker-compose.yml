## Alliances PRO marketing site (alliances.pro)
## Self-contained: frontend (Next.js) + backend (Laravel 13 + Filament 5)
## Independent of the Sales CRM project — separate database, separate stack.
##
## Bring it all up:    docker-compose up -d
## Backend bootstrap:  see backend/README.md
## Frontend bootstrap: see frontend/README.md
##
## All composer / artisan / npm commands MUST be run inside their respective
## containers — never on the host.

name: alliances-marketing

services:
  # ---------------------------------------------------------------------------
  # Backend — Laravel 13 + Filament 5 admin panel + public marketing API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alliances_marketing_backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: alliances_marketing
      DB_USERNAME: alliances
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alliances_marketing

  # ---------------------------------------------------------------------------
  # Frontend — Next.js 16.2 marketing site (cosmic theme)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alliances_marketing_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost/api/v1/marketing
      NEXT_PUBLIC_SITE_URL: http://localhost
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ""
    command: ["npm", "run", "dev"]
    networks:
      - alliances_marketing

  # ---------------------------------------------------------------------------
  # Nginx — fronts both apps
  #   /admin/*        → backend (Filament)
  #   /api/*          → backend (Laravel API)
  #   everything else → frontend (Next.js)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: alliances_marketing_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      - backend
      - frontend
    networks:
      - alliances_marketing

  # ---------------------------------------------------------------------------
  # MySQL 8 — marketing database (separate from CRM database)
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: alliances_marketing_mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --sql_mode=STRICT_ALL_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: alliances_marketing
      MYSQL_USER: alliances
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"   # Host port 3307 to avoid colliding with the CRM's MySQL
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - alliances_marketing

  # ---------------------------------------------------------------------------
  # Redis — cache, queues, sessions
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: alliances_marketing_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - alliances_marketing

  # ---------------------------------------------------------------------------
  # Mailpit — local mail catcher; UI at http://localhost:8025
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: alliances_marketing_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - alliances_marketing

  # ---------------------------------------------------------------------------
  # Horizon — queue worker (started after backend bootstraps Horizon)
  # ---------------------------------------------------------------------------
  horizon:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alliances_marketing_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    command: ["php", "artisan", "horizon"]
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: alliances_marketing
      DB_USERNAME: alliances
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - alliances_marketing

  # ---------------------------------------------------------------------------
  # Scheduler — runs `artisan schedule:run` every minute
  # ---------------------------------------------------------------------------
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alliances_marketing_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: alliances_marketing
      DB_USERNAME: alliances
      DB_PASSWORD: secret
      REDIS_HOST: redis
    depends_on:
      backend:
        condition: service_started
    networks:
      - alliances_marketing

volumes:
  mysql_data:
  redis_data:
  backend_vendor:
  frontend_node_modules:
  frontend_next:

networks:
  alliances_marketing:
    driver: bridge
